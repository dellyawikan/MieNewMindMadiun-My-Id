<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - MieNewMind</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        h1 {
            font-size: 48px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 24px;
            color: #667eea;
            margin-bottom: 30px;
            font-weight: 600;
        }
        
        .description {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .status-box {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 40px;
            border-left: 4px solid #ff9800;
        }
        
        .status-box .status-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }
        
        .status-box .status-text {
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .status-box .status-detail {
            color: #999;
            font-size: 14px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .button-primary {
            background: #667eea;
            color: white;
        }
        
        .button-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .button-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .button-secondary:hover {
            background: #f5f5f5;
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 14px;
        }
        
        .footer-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .footer-link:hover {
            text-decoration: underline;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 5px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">💸</div>
        
        <h1>404 Not Found</h1>
        <div class="subtitle">Bayar Dulu!</div>
        <div class="description">
            💰 Bayar dulu baru website bisa jalan<br>
            Server ga ada yang gratis! 😅
        </div>
        
        <div class="status-box">
            <div class="status-icon">💳</div>
            <div class="status-text">Server Lagi Menagih Hutang</div>
            <div class="status-detail">Tunggu sampai credit card siap 💸</div>
        </div>
        
        <div class="button-group">
            <button class="button button-secondary" onclick="location.href='https://mienewmind.pages.dev/admin-toggle.html'">
                🔧 Admin Panel
            </button>
            <button class="button button-primary" onclick="location.reload()">
                ♻️ Refresh
            </button>
        </div>
        
        <div class="footer">
            <p>For inquiries, please contact us via WhatsApp</p>
            <p style="margin-top: 15px;">
                <a href="https://wa.me/6281391302979" class="footer-link">📱 WhatsApp Us</a>
            </p>
        </div>
    </div>
</body>
</html>
