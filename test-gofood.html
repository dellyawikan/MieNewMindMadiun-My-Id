<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoFood Section Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 100%;
    }
  </style>
</head>
<body>
  <!-- GOFOOD SECTION TEST -->
  <section class="gofood-section">
    <div class="gofood-overlay"></div>

    <div class="gofood-content">
      
      <div class="gofood-text">
        <p class="eyebrow">DELIVERY</p>
        <h2 class="gofood-title">
          Pesan via <span>GoFood</span>
        </h2>
      </div>

      <div class="gofood-box">

        <div class="gofood-image">
          <img
            src="assets/pages/pesan gofood.jpeg"
            alt="GoFood Delivery"
          />
        </div>

        <div class="gofood-content">

          <h3>Pesan via GoFood</h3>

          <p>
            Tersedia delivery online via GoFood (Gojek).
            Pesan sekarang dan nikmati Mie Newmind
            di rumahmu dengan mudah dan cepat.
          </p>

          <a
            class="gofood-btn"
            href="https://gofood.link/a/MVgE9r3"
            target="_blank"
            rel="noreferrer"
          >
            ORDER VIA GOFOOD →
          </a>

        </div>

      </div>
    </div>
  </section>
</body>
</html>
